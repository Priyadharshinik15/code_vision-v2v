{% macro navbar(active='') %}
<nav class="navbar">
  <div class="nav-brand">
    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Rakshita logo" class="logo-img logo-img-sm">
    RAKSHITA
  </div>
  <div class="nav-links">
    <a href="{{ url_for('dashboard') }}" style="{{ 'color:#8b7bd8;font-weight:700;' if active=='dashboard' }}">Dashboard</a>
    <a href="{{ url_for('contacts') }}" style="{{ 'color:#8b7bd8;font-weight:700;' if active=='contacts' }}">Contacts</a>
    <a href="{{ url_for('incident_map') }}" style="{{ 'color:#8b7bd8;font-weight:700;' if active=='map' }}">Map</a>
    <a href="{{ url_for('report_incident') }}" style="{{ 'color:#8b7bd8;font-weight:700;' if active=='report' }}">Report</a>
    {% if aadhaar_kyc_enabled %}
    <a href="{{ url_for('aadhaar_kyc') }}" style="{{ 'color:#8b7bd8;font-weight:700;' if active=='kyc' }}">KYC</a>
    {% endif %}
    {% if current_user and current_user.is_admin() %}
    <a href="{{ url_for('admin_dashboard') }}" style="{{ 'color:#8b7bd8;font-weight:700;' if active=='admin' }}">Admin</a>
    {% endif %}
    <a href="{{ url_for('logout') }}" class="btn btn-outline btn-small">Logout</a>
  </div>
</nav>
{% endmacro %}
