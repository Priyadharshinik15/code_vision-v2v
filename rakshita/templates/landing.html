{% extends "base.html" %}
{% block title %}Rakshita — Because every woman deserves to feel safe, always.{% endblock %}
{% block body %}
<div class="page-center">
  <div class="brand-card">

    <div class="logo-mark">
      <svg width="140" height="150" viewBox="0 0 150 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="shieldGrad" x1="0" y1="0" x2="150" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#c9b8f0"/>
            <stop offset="1" stop-color="#8b7bd8"/>
          </linearGradient>
          <linearGradient id="faceGrad" x1="30" y1="20" x2="115" y2="150" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#b39ce8"/>
            <stop offset="1" stop-color="#7a6bc9"/>
          </linearGradient>
        </defs>
        <path d="M75,8 L138,26 V78 C138,118 112,144 75,156 C38,144 12,118 12,78 V26 Z"
              stroke="url(#shieldGrad)" stroke-width="4" fill="none"/>
        <path d="M74,36 C66,36 59,40 55,47 C53,51 52,55 49,58 C45,60 41,61 38,63
                 C42,65 46,66 49,68 C47,71 47,75 50,78 C53,82 58,85 62,89
                 C66,94 68,100 69,107 C70,113 70,118 68,123 C71,128 76,132 78,138
                 C82,148 80,158 70,163 C61,168 50,165 44,157 C39,150 39,141 43,133
                 C39,127 37,120 38,113 C39,105 43,98 49,93 C44,88 41,82 41,75
                 C41,64 46,55 54,49 C51,45 51,40 55,37 C61,33 68,33 74,36 Z"
              fill="url(#faceGrad)"/>
        <path d="M62,58 C67,65 68,74 65,82" stroke="#6d5b9e" stroke-width="1.2" fill="none" opacity="0.3"/>
        <path d="M60,100 C66,109 68,120 63,130" stroke="#6d5b9e" stroke-width="1.2" fill="none" opacity="0.3"/>
        <g transform="translate(104,86) rotate(30)">
          <line x1="0" y1="0" x2="36" y2="48" stroke="#d69ba1" stroke-width="1.4" opacity="0.75"/>
          <ellipse cx="9" cy="13" rx="8" ry="16" fill="#eec3c7" transform="rotate(20 9 13)"/>
          <ellipse cx="19" cy="29" rx="7" ry="14" fill="#f0a8ad" transform="rotate(15 19 29)"/>
          <ellipse cx="28" cy="44" rx="6" ry="12" fill="#eec3c7" transform="rotate(8 28 44)"/>
        </g>
      </svg>
    </div>

    <h1 class="wordmark">RAKSHITA</h1>

    <div class="heart-divider">
      <span class="line"></span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.3 2.3 4.5 6 4c2.2-.3 4 1 6 3.3C14 5 15.8 3.7 18 4c3.7.5 5.6 4.3 4 7.7C19.5 16.4 12 21 12 21z"/></svg>
      <span class="line"></span>
    </div>

    <p class="tagline">Because every woman deserves<br>to feel safe, always.</p>

    <a href="{{ url_for('register') }}" class="btn btn-primary">
      Register
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <div class="divider-or">or</div>

    <a href="{{ url_for('login') }}" class="btn btn-secondary">
      Login
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <div class="footer-note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 L20 5 V11 C20 16.5 16.5 20.5 12 22 C7.5 20.5 4 16.5 4 11 V5 Z"/><path d="M9 12l2 2 4-4"/></svg>
      Your Safety. Our Priority.
    </div>

  </div>
</div>
{% endblock %}
